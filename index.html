<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>賀卡影片產生器 — 專員產出</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo">賀</div>
        <div>
          <h1>賀卡影片產生器</h1>
          <div class="sub">選範本 → 下載影片 → 拖入 → 輸入名字 → 產出</div>
        </div>
      </div>
      <div class="right">
        <span class="pill" id="monthTag"></span>
        <a class="btn btn-ghost" href="editor.html" title="管理者用">範本編輯</a>
      </div>
    </div>

    <div id="browserWarn" class="alert warn hide">
      建議使用 <b>Chrome</b> 或 <b>Edge</b> 瀏覽器。其他瀏覽器可能無法產出影片。
    </div>

    <!-- 首頁：範本卡片 -->
    <section id="home">
      <div id="cards" class="grid"></div>
    </section>

    <!-- 產出流程（簡化：下載→拖入→打名字→產出） -->
    <section id="flow" class="hide">
      <div class="topbar" style="border:0;margin-bottom:8px;padding:0">
        <button class="btn btn-ghost" id="backBtn">← 換一個範本</button>
        <h2 id="flowTitle" style="margin:0;font-size:18px"></h2>
        <span></span>
      </div>

      <!-- 區塊 1：取得影片（下載＋拖入合併） -->
      <div class="block">
        <h3>1　取得影片</h3>
        <div class="sub">先下載這支範本影片，再把它拖進下面的框。</div>
        <div class="dlrow">
          <a class="btn btn-primary btn-lg" id="dlBtn" target="_blank" rel="noopener">⬇ 下載影片</a>
          <span class="muted">下載後 →</span>
        </div>
        <div class="drop" id="drop">
          <div class="big" id="dropMsg">把下載好的影片拖到這裡（或點這裡選檔案）</div>
          <div class="small">檔名：<b id="expectName" class="mono"></b>　·　建議 1080p、60 秒內</div>
        </div>
        <input type="file" id="fileInput" accept="video/*" class="hide">
        <div class="alert err hide" id="dropErr"></div>
        <div id="pvWrap" class="preview hide" style="margin-top:12px">
          <video id="pvVideo" muted playsinline></video>
          <div class="layer" id="pvLayer"></div>
        </div>
      </div>

      <!-- 區塊 2：打名字 → 產出（拖入後才出現） -->
      <div class="block hide" id="makeBlock">
        <h3>2　填文字，然後產出</h3>
        <div class="sub">填名字、賀語，上方預覽會即時顯示。換文字直接改再按產出，不用重拖影片。</div>
        <div id="nameInputs"></div>
        <button class="adv-toggle" id="advToggle" type="button"><span class="caret">▸</span> 更多設定（文字顏色）</button>
        <div class="adv-body hide" id="advBody"></div>
        <div class="genrow">
          <button class="btn btn-primary btn-lg" id="genBtn" disabled style="flex:1">產出賀卡影片</button>
        </div>
        <div id="prog" class="hide" style="margin-top:14px">
          <div class="progress"><i id="progBar"></i></div>
          <div class="progress-label" id="progLabel"></div>
        </div>
      </div>
    </section>

    <div class="footnote">
      因瀏覽器安全限制（CORS），無法自動從 Google Drive 抓影片，所以需要你先下載再拖入。所有處理都在你的電腦瀏覽器內完成，影片不會上傳。
    </div>
  </div>

  <script src="js/lib.js"></script>
  <script src="js/staff.js"></script>
</body>
</html>
